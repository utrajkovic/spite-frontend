<ion-content>
  <page-loading-overlay [active]="isLoading" message="Loading..."></page-loading-overlay>

  <div class="page-wrap">

    <div class="page-header">
      <h1 class="page-title">My Clients</h1>
      <span class="count-badge" *ngIf="clients.length > 0">{{ clients.length }}</span>
    </div>

    <div class="invite-card">
      <p class="card-label">Invite a client</p>
      <div class="invite-row">
        <ion-input [(ngModel)]="clientUsername" placeholder="Client username" class="invite-input"></ion-input>
        <ion-button (click)="addClient()" class="invite-btn">
          <i class="fa-solid fa-paper-plane" slot="icon-only"></i>
        </ion-button>
      </div>
    </div>

    <div class="clients-wrap">
      <div class="empty-state" *ngIf="clients.length === 0 && !isLoading">
        <i class="fa-solid fa-users-slash"></i>
        <p>No clients yet.<br>Send an invite to get started.</p>
      </div>

      <div class="client-card" *ngFor="let c of clients" (click)="goToClient(c.clientUsername)">
        <div class="avatar">{{ c.clientUsername[0] | uppercase }}</div>
        <div class="client-info">
          <span class="client-name">{{ c.clientUsername }}</span>
          <span class="client-hint">Tap to manage</span>
        </div>
        <button class="remove-btn" (click)="confirmRemoveClient(c.clientUsername); $event.stopPropagation()">
          <i class="fa-solid fa-user-minus"></i>
        </button>
      </div>
    </div>

  </div>
</ion-content>
