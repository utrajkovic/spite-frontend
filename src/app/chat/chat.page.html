<div class="chat-header">
  <button class="back-btn" (click)="goBack()">
    <i class="fa-solid fa-chevron-left"></i>
  </button>

  <div class="chat-username">{{ other }}</div>
</div>

<ion-content class="chat-page">

  <div class="chat-scroll-area">
    <div class="chat-container">

      <div class="chat-list">
        <div *ngFor="let msg of messages" class="msg" [class.me]="msg.senderId === me">
          <div class="bubble">{{ msg.text }}</div>
        </div>

        <div id="chat-bottom"></div>
      </div>

    </div>
  </div>

</ion-content>
<div class="input-row">
  <ion-input [(ngModel)]="text" placeholder="Message..." (keyup.enter)="send()"></ion-input>
  <ion-button (click)="send()" class="send-btn">
    <i class="fa-solid fa-paper-plane"></i>
  </ion-button>
</div>
