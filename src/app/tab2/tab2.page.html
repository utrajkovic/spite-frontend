<ion-content [fullscreen]="true">
  <page-loading-overlay [active]="isSavingExercise || isSavingWorkout" message="Please wait..."></page-loading-overlay>

  <div class="tab-switcher">
    <button class="tab-btn" [class.active]="tab === 'exercise'" (click)="tab = 'exercise'">
      <i class="fa-solid fa-dumbbell"></i> Exercise
    </button>
    <button class="tab-btn" [class.active]="tab === 'workout'" (click)="tab = 'workout'">
      <i class="fa-solid fa-fire"></i> Workout
    </button>
  </div>

  <!-- ADD EXERCISE -->
  <ng-container *ngIf="tab === 'exercise'">
    <div class="form-section">
      <p class="section-label">New Exercise</p>

      <div class="field">
        <label>Name</label>
        <ion-input [formControl]="exerciseForm.controls['name']" placeholder="Exercise name"></ion-input>
      </div>

      <div class="field">
        <label>Description</label>
        <ion-input [formControl]="exerciseForm.controls['description']" placeholder="Brief description"></ion-input>
      </div>

      <div class="video-upload">
        <label><i class="fa-solid fa-video"></i> Video (optional)</label>
        <input type="file" accept="video/*" (change)="onVideoSelected($event)" />
      </div>

      <ion-button expand="block" class="primary-btn" (click)="saveExercise()">
        <ion-spinner *ngIf="isSavingExercise" name="crescent" slot="start"></ion-spinner>
        <i class="fa-solid fa-plus" slot="start" *ngIf="!isSavingExercise"></i>
        {{ isSavingExercise ? 'Saving...' : 'Add Exercise' }}
      </ion-button>
    </div>
  </ng-container>

  <!-- ADD WORKOUT -->
  <ng-container *ngIf="tab === 'workout'">
    <div class="form-section">
      <p class="section-label">Workout Info</p>

      <div class="field">
        <label>Title</label>
        <ion-input [formControl]="workoutForm.controls['title']" placeholder="Workout title"></ion-input>
      </div>
      <div class="field">
        <label>Category</label>
        <ion-input [formControl]="workoutForm.controls['subtitle']" placeholder="e.g. Upper Body"></ion-input>
      </div>
      <div class="field">
        <label>Description</label>
        <ion-input [formControl]="workoutForm.controls['content']" placeholder="Optional description"></ion-input>
      </div>

      <p class="section-label" *ngIf="editableExercises.length > 0">Exercises ({{ editableExercises.length }})</p>

      <ion-reorder-group [disabled]="false" (ionItemReorder)="handleReorder($event)">
        <ion-item lines="none" *ngFor="let ex of editableExercises; let i = index" class="exercise-row">
          <ion-reorder slot="start"></ion-reorder>
          <div class="ex-name" (click)="openExerciseModal(i)">
            {{ ex.name }}
            <span class="ex-superset" *ngIf="workoutItems[i].supersetExerciseId">
              → {{ getExerciseNameById(workoutItems[i].supersetExerciseId) }}
            </span>
          </div>
          <ion-button fill="clear" class="delete-btn" slot="end" (click)="removeExercise(i)">
            <i class="fa-solid fa-xmark"></i>
          </ion-button>
        </ion-item>
      </ion-reorder-group>

      <p class="section-label">Add Exercise</p>

      <ion-searchbar [value]="searchQuery" (ionInput)="onSearch($event)" placeholder="Search exercises..."></ion-searchbar>

      <div class="search-item" *ngFor="let ex of filteredExercises">
        <span>{{ ex.name }}</span>
        <ion-button fill="outline" class="add-btn" (click)="addExercise(ex)">
          <i class="fa-solid fa-plus" slot="start"></i> Add
        </ion-button>
      </div>

      <ion-button expand="block" class="success-btn" (click)="saveNewWorkout()" [disabled]="isSavingWorkout">
        <ion-spinner *ngIf="isSavingWorkout" name="crescent" slot="start"></ion-spinner>
        <i class="fa-solid fa-check" slot="start" *ngIf="!isSavingWorkout"></i>
        {{ isSavingWorkout ? 'Creating...' : 'Create Workout' }}
      </ion-button>
    </div>
  </ng-container>

</ion-content>
