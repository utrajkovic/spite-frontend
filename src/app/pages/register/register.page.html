<ion-content class="auth-page">
  <div class="auth-wrapper">

    <div class="brand">
      <h1 class="flicker">SPITE</h1>
      <p>Create your account</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="register()" class="auth-form">

      <div class="field">
        <label>Username</label>
        <ion-input formControlName="username" placeholder="Choose a username"></ion-input>
      </div>

      <div class="field">
        <label>Password</label>
        <ion-input type="password" formControlName="password" placeholder="Create a password"></ion-input>
      </div>

      <div class="field">
        <label>Confirm Password</label>
        <ion-input type="password" formControlName="confirmPassword" placeholder="Repeat password"></ion-input>
      </div>

      <div class="password-rules">
        <p [class.valid]="passwordStatus.length"><i class="fa-solid fa-circle-check"></i> 6–50 characters</p>
        <p [class.valid]="passwordStatus.upper"><i class="fa-solid fa-circle-check"></i> At least one uppercase letter</p>
        <p [class.valid]="passwordStatus.number"><i class="fa-solid fa-circle-check"></i> At least one number</p>
      </div>

      <ion-button expand="block" type="submit" class="submit-btn" [disabled]="loading">
        <ion-spinner *ngIf="loading" name="crescent" slot="start"></ion-spinner>
        {{ loading ? 'Registering...' : 'Register' }}
      </ion-button>

    </form>

    <div class="auth-footer">
      <span>Already have an account?</span>
      <ion-button fill="clear" routerLink="/login" class="link-btn">Login</ion-button>
    </div>

  </div>
</ion-content>
